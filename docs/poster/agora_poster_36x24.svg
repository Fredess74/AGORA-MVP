<text x="2625" y="397" font-size="34" font-weight="700" fill="#0f172a">Trust Engine</text>
<text x="2625" y="437" font-size="28" font-weight="400" fill="#475569">Verify, score &amp; monitor</text>

<!-- Arrow -->
<line x1="2570" y1="455" x2="2570" y2="505" stroke="#93c5fd" stroke-width="4"/>
<polygon points="2555,498 2570,523 2585,498" fill="#93c5fd"/>

<!-- Step 3 -->
<circle cx="2570" cy="570" r="30" fill="#a855f7"/>
<text x="2570" y="580" font-size="28" font-weight="900" fill="white" text-anchor="middle">3</text>
<text x="2625" y="562" font-size="34" font-weight="700" fill="#0f172a">AI Agents</text>
<text x="2625" y="602" font-size="28" font-weight="400" fill="#475569">Discover &amp; transact safely</text>


<!-- BUSINESS MODEL -->
<rect x="2480" y="800" width="1060" height="570" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
<text x="2530" y="878" font-size="44" font-weight="800" fill="#0f172a">Business Model</text>

<!-- Rev 1 -->
<circle cx="2570" cy="970" r="26" fill="#dbeafe"/>
<text x="2570" y="980" font-size="22" font-weight="900" fill="#2563eb" text-anchor="middle">$</text>
<text x="2620" y="963" font-size="32" font-weight="700" fill="#0f172a">Transaction Fees</text>
<text x="2620" y="1000" font-size="26" font-weight="400" fill="#475569">Revenue share on usage</text>

<!-- Rev 2 -->
<circle cx="2570" cy="1080" r="26" fill="#dbeafe"/>
<text x="2570" y="1090" font-size="22" font-weight="900" fill="#2563eb" text-anchor="middle">$</text>
<text x="2620" y="1073" font-size="32" font-weight="700" fill="#0f172a">Premium Badges</text>
<text x="2620" y="1110" font-size="26" font-weight="400" fill="#475569">Verified trust certification</text>

<!-- Rev 3 -->
<circle cx="2570" cy="1190" r="26" fill="#dbeafe"/>
<text x="2570" y="1200" font-size="22" font-weight="900" fill="#2563eb" text-anchor="middle">$</text>
<text x="2620" y="1183" font-size="32" font-weight="700" fill="#0f172a">Enterprise API</text>
<text x="2620" y="1220" font-size="26" font-weight="400" fill="#475569">White-label integrations</text>


<!-- STRATEGIC ROADMAP -->
<rect x="2480" y="1410" width="1060" height="520" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
<text x="2530" y="1490" font-size="44" font-weight="800" fill="#0f172a">Roadmap</text>

<!-- Phase 1 -->
<rect x="2530" y="1540" width="130" height="44" rx="10" fill="#3b82f6"/>
<text x="2595" y="1570" font-size="22" font-weight="800" fill="white" text-anchor="middle">Phase 1</text>
<text x="2685" y="1558" font-size="30" font-weight="700" fill="#0f172a">Supply Platform</text>
<text x="2685" y="1594" font-size="26" font-weight="400" fill="#475569">API, SDKs, tools directory</text>

<!-- Phase 2 -->
<rect x="2530" y="1640" width="130" height="44" rx="10" fill="#6366f1"/>
<text x="2595" y="1670" font-size="22" font-weight="800" fill="white" text-anchor="middle">Phase 2</text>
<text x="2685" y="1658" font-size="30" font-weight="700" fill="#0f172a">Marketplace</text>
<text x="2685" y="1694" font-size="26" font-weight="400" fill="#475569">Payments &amp; transactions</text>

<!-- Phase 3 -->
<rect x="2530" y="1740" width="130" height="44" rx="10" fill="#a855f7"/>
<text x="2595" y="1770" font-size="22" font-weight="800" fill="white" text-anchor="middle">Phase 3</text>
<text x="2685" y="1758" font-size="30" font-weight="700" fill="#0f172a">Full Orchestration</text>
<text x="2685" y="1794" font-size="26" font-weight="400" fill="#475569">Autonomous AI economy</text>


<!-- ═══ BOTTOM BAR ═══ -->
<rect y="2060" width="3600" height="340" fill="#0f172a" rx="0"/>

<!-- Bottom bar content -->
<text x="100" y="2200" font-size="50" font-weight="900" fill="white">AGORA</text>
<text x="100" y="2250" font-size="26" font-weight="400" fill="#94a3b8">Trust Infrastructure for Autonomous Commerce</text>

<!-- Gartner quote -->
<text x="1800" y="2180" font-size="28" font-weight="500" fill="#e2e8f0" text-anchor="middle" font-style="italic">"By 2027, 80% of online purchases will involve an AI agent."</text>
<text x="1800" y="2220" font-size="22" font-weight="400" fill="#64748b" text-anchor="middle">— Gartner</text>

<!-- Contact -->
