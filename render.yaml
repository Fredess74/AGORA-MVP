services:
  - type: web
    name: agora-orchestrator
    runtime: node
    buildCommand: cd packages/orchestrator && npm install
    startCommand: cd packages/orchestrator && npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
