apiVersion: apps/v1
kind: Deployment
metadata:
  name: agora-api
  namespace: agora
  labels:
    app: agora-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agora-api
  template:
    metadata:
      labels:
        app: agora-api
    spec:
      containers:
        - name: api
          image: agora/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: AGORA_HOST
              value: "0.0.0.0"
            - name: AGORA_PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agora-secrets
                  key: database-url
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agora-api
  namespace: agora
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: agora-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agora-api
  namespace: agora
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.agora.network
      secretName: agora-api-tls
  rules:
    - host: api.agora.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agora-api
                port:
                  number: 80
